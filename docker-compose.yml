version: '3.8'

# ===========================================
# CVE Threat Radar - Docker Compose Configuration
# ===========================================
# Security Enhancement: Externalized secrets and credentials
#
# IMPORTANT: Before running in production:
# 1. Create a .env file with the required secrets
# 2. Never commit .env to version control
# 3. Use strong, randomly generated passwords
# ===========================================

services:
  # PostgreSQL Database
  db:
    image: postgres:15-alpine
    container_name: cve-radar-db
    environment:
      # Use environment variables for credentials
      POSTGRES_USER: ${POSTGRES_USER:-cve_radar}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-cve_threat_radar}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # Port not exposed to host - access via internal network only
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-cve_radar}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - cve-network
    restart: unless-stopped

  # Redis for caching and queues
  redis:
    image: redis:7-alpine
    container_name: cve-radar-redis
    command: ["redis-server", "--appendonly", "yes", "--requirepass", "${REDIS_PASSWORD:?REDIS_PASSWORD is required}"]
    # Port not exposed to host - access via internal network only
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - cve-network
    restart: unless-stopped

  # FastAPI Backend
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cve-radar-api
    environment:
      # Database configuration
      DATABASE_URL: postgresql://${POSTGRES_USER:-cve_radar}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-cve_threat_radar}
      ASYNC_DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-cve_radar}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-cve_threat_radar}

      # Redis configuration (password required)
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0

      # Application settings
      ENVIRONMENT: ${ENVIRONMENT:-production}
      DEBUG: ${DEBUG:-false}

      # Security settings - MUST be set in production
      SECRET_KEY: ${SECRET_KEY:?SECRET_KEY is required}
      AUTH_ENABLED: ${AUTH_ENABLED:-true}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:3000}

      # Rate limiting
      RATE_LIMIT_ENABLED: ${RATE_LIMIT_ENABLED:-true}
      RATE_LIMIT_REQUESTS_PER_MINUTE: ${RATE_LIMIT_REQUESTS_PER_MINUTE:-100}

      # External API keys
      NVD_API_KEY: ${NVD_API_KEY:-}
    ports:
      - "127.0.0.1:8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - model_data:/app/models
      - ./data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - cve-network
    restart: unless-stopped

  # Frontend (Nginx serving static files)
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: cve-radar-frontend
    ports:
      - "127.0.0.1:3000:80"
    depends_on:
      - api
    networks:
      - cve-network
    restart: unless-stopped

  # Prometheus for monitoring
  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: cve-radar-prometheus
    ports:
      - "127.0.0.1:9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    networks:
      - cve-network
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  model_data:
  prometheus_data:

networks:
  cve-network:
    driver: bridge
