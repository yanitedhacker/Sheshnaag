version: '3.8'

# ===========================================
# Project Sheshnaag - Small-Team Server Topology
# ===========================================
# Supported v2 deployment shape:
#   frontend + api + postgres + redis + prometheus
# ===========================================

services:
  # PostgreSQL Database
  db:
    image: postgres:15-alpine
    container_name: sheshnaag-db
    environment:
      # Use environment variables for credentials
      POSTGRES_USER: ${POSTGRES_USER:-sheshnaag}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-sheshnaag}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # Port not exposed to host - access via internal network only
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-cve_radar}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sheshnaag-network
    restart: unless-stopped

  # Redis for caching and queues
  redis:
    image: redis:7-alpine
    container_name: sheshnaag-redis
    command: ["redis-server", "--appendonly", "yes", "--requirepass", "${REDIS_PASSWORD:?REDIS_PASSWORD is required}"]
    # Port not exposed to host - access via internal network only
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sheshnaag-network
    restart: unless-stopped

  # FastAPI Backend
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sheshnaag-api
    environment:
      # Database configuration
      DATABASE_URL: postgresql://${POSTGRES_USER:-sheshnaag}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-sheshnaag}
      ASYNC_DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-sheshnaag}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-sheshnaag}

      # Redis configuration (password required)
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0

      # Application settings
      ENVIRONMENT: ${ENVIRONMENT:-production}
      DEPLOYMENT_PROFILE: ${DEPLOYMENT_PROFILE:-shared_server}
      DEPLOYMENT_NAME: ${DEPLOYMENT_NAME:-sheshnaag-server}
      DEBUG: ${DEBUG:-false}

      # Security settings - MUST be set in production
      SECRET_KEY: ${SECRET_KEY:?SECRET_KEY is required}
      AUTH_ENABLED: ${AUTH_ENABLED:-true}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:3000}
      SIGNING_KEY_DIR: ${SIGNING_KEY_DIR:?SIGNING_KEY_DIR is required}
      SIGNING_KEY_BACKEND: ${SIGNING_KEY_BACKEND:-mounted-secret}

      # Rate limiting
      RATE_LIMIT_ENABLED: ${RATE_LIMIT_ENABLED:-true}
      RATE_LIMIT_REQUESTS_PER_MINUTE: ${RATE_LIMIT_REQUESTS_PER_MINUTE:-100}

      # External API keys
      NVD_API_KEY: ${NVD_API_KEY:-}
    ports:
      - "127.0.0.1:8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - model_data:/app/models
      - ./data:/app/data
      - ${SIGNING_KEY_DIR}:${SIGNING_KEY_DIR}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - sheshnaag-network
    restart: unless-stopped

  # Sandbox worker for queued execute-mode runs
  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sheshnaag-worker
    entrypoint: ["python", "-m", "app.workers.sandbox_worker"]
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-sheshnaag}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-sheshnaag}
      ASYNC_DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-sheshnaag}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-sheshnaag}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      ENVIRONMENT: ${ENVIRONMENT:-production}
      DEPLOYMENT_PROFILE: ${DEPLOYMENT_PROFILE:-shared_server}
      DEPLOYMENT_NAME: ${DEPLOYMENT_NAME:-sheshnaag-server}
      DEBUG: ${DEBUG:-false}
      SECRET_KEY: ${SECRET_KEY:?SECRET_KEY is required}
      AUTH_ENABLED: ${AUTH_ENABLED:-true}
      SIGNING_KEY_DIR: ${SIGNING_KEY_DIR:?SIGNING_KEY_DIR is required}
      SIGNING_KEY_BACKEND: ${SIGNING_KEY_BACKEND:-mounted-secret}
      NVD_API_KEY: ${NVD_API_KEY:-}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - model_data:/app/models
      - ./data:/app/data
      - ${SIGNING_KEY_DIR}:${SIGNING_KEY_DIR}
    networks:
      - sheshnaag-network
    restart: unless-stopped

  # Frontend (Nginx serving static files)
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: sheshnaag-frontend
    ports:
      - "127.0.0.1:3000:80"
    depends_on:
      - api
    networks:
      - sheshnaag-network
    restart: unless-stopped

  # Prometheus for monitoring
  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: sheshnaag-prometheus
    ports:
      - "127.0.0.1:9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    networks:
      - sheshnaag-network
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  model_data:
  prometheus_data:

networks:
  sheshnaag-network:
    driver: bridge
