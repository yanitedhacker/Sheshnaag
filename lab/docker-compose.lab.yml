version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: cve-radar-lab-db
    environment:
      POSTGRES_USER: ${LAB_POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${LAB_POSTGRES_PASSWORD:?LAB_POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${LAB_POSTGRES_DB:-cve_threat_radar_lab}
    volumes:
      - lab_postgres_data:/var/lib/postgresql/data
    ports:
      - "15432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - cve-lab-network

  redis:
    image: redis:7-alpine
    container_name: cve-radar-lab-redis
    ports:
      - "16379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - cve-lab-network

  api:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: cve-radar-lab-api
    environment:
      DATABASE_URL: postgresql://${LAB_POSTGRES_USER:-postgres}:${LAB_POSTGRES_PASSWORD}@db:5432/${LAB_POSTGRES_DB:-cve_threat_radar_lab}
      ASYNC_DATABASE_URL: postgresql+asyncpg://${LAB_POSTGRES_USER:-postgres}:${LAB_POSTGRES_PASSWORD}@db:5432/${LAB_POSTGRES_DB:-cve_threat_radar_lab}
      REDIS_URL: redis://redis:6379/0
      ENVIRONMENT: test
      DEBUG: "false"
      SECRET_KEY: ${LAB_SECRET_KEY:?LAB_SECRET_KEY is required}
      NVD_API_KEY: ${LAB_NVD_API_KEY:-}
    ports:
      - "18000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - cve-lab-network

  pytest:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: cve-radar-lab-pytest
    environment:
      LAB_API_BASE: http://api:8000
      LAB_WAIT_TIMEOUT_SECONDS: "90"
    depends_on:
      api:
        condition: service_started
    entrypoint: ["/bin/bash", "-lc"]
    command: >
      python scripts/init_db.py &&
      pytest -m "not load"
    networks:
      - cve-lab-network

  locust:
    image: locustio/locust:2.32.4
    container_name: cve-radar-lab-locust
    environment:
      LOCUST_HOST: http://api:8000
    volumes:
      - ./locust:/mnt/locust
      - ./results:/mnt/results
    depends_on:
      api:
        condition: service_started
    command: >
      -f /mnt/locust/locustfile.py
      --headless
      -u 2 -r 1
      -t 1m
      --csv /mnt/results/smoke
    networks:
      - cve-lab-network

volumes:
  lab_postgres_data:

networks:
  cve-lab-network:
    driver: bridge
